<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Stunde Null · Die Ordnung des Wiederaufbaus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   STUNDE NULL — Escape Room
   Politik & Wirtschaft · Q-Phase Grundkurs · Soziale Marktwirtschaft
   Helles, seriös-wirtschaftliches Design
   ============================================================ */

:root{
  --bg:           #f4f1ea;
  --bg-soft:      #efeae0;
  --surface:      #ffffff;
  --surface-alt:  #faf8f3;
  --ink:          #1d2733;
  --ink-soft:     #43505f;
  --ink-mute:     #6c7888;
  --primary:      #1f4e5f;   /* tiefes Petrol */
  --primary-dark: #163a47;
  --primary-soft: #e6eef0;
  --accent:       #a9772a;   /* gedämpftes Ocker/Gold */
  --accent-bright:#c08f3e;
  --accent-soft:  #f3ebda;
  --success:      #2f7d41;
  --success-bg:   #e9f3ea;
  --error:        #b1442f;
  --error-bg:     #f8eae6;
  --missed:       #a9772a;
  --missed-bg:    #f6efdf;
  --border:       rgba(29,39,51,0.12);
  --border-soft:  rgba(29,39,51,0.07);
  --shadow-sm:    0 1px 3px rgba(29,39,51,0.07), 0 1px 2px rgba(29,39,51,0.05);
  --shadow-md:    0 6px 24px rgba(29,39,51,0.10), 0 2px 6px rgba(29,39,51,0.06);
  --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
  --font-body:    'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono:    'IBM Plex Mono', 'Menlo', 'Courier New', monospace;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  font-weight:400;
  line-height:1.65;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
body::before{
  content:'';
  position:fixed; inset:0; z-index:-2;
  background:
    radial-gradient(ellipse at 12% 8%, rgba(31,78,95,0.06) 0%, transparent 45%),
    radial-gradient(ellipse at 90% 92%, rgba(169,119,42,0.06) 0%, transparent 45%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
  pointer-events:none;
}

.app{ min-height:100vh; display:flex; flex-direction:column; }

/* ---------- Topbar ---------- */
.topbar{
  position:sticky; top:0; z-index:50;
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border-soft);
  padding:12px 26px;
  display:flex; align-items:center; justify-content:space-between; gap:20px;
}
.topbar-brand{
  display:flex; align-items:center; gap:11px;
  font-family:var(--font-display); font-weight:600; font-size:15px;
  color:var(--primary); letter-spacing:0.01em;
}
.topbar-brand svg{ width:24px; height:24px; stroke:var(--primary); fill:none; }
.topbar-progress{ display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.seal{
  width:30px; height:30px; border-radius:50%;
  border:1.5px solid var(--border); background:var(--surface);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:11px; font-weight:600;
  color:var(--ink-mute); transition:all .35s cubic-bezier(.4,0,.2,1);
}
.seal.library{
  width:11px; height:11px; border-radius:2px; border:1.5px solid var(--border);
  background:transparent;
}
.seal.library.active{ border-color:var(--primary); background:var(--primary); }
.seal.library.visited{ border-color:var(--accent); background:var(--accent); }
.seal.active{ border-color:var(--primary); color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft); }
.seal.solved{
  background:var(--accent); border-color:var(--accent); color:#fff;
  font-family:var(--font-display); font-weight:700; font-size:14px; transform:rotate(-3deg);
}

/* ---------- Layout ---------- */
.main{ flex:1; display:flex; align-items:flex-start; justify-content:center; padding:52px 22px 64px; }
.screen{ width:100%; max-width:880px; animation:screenIn .55s cubic-bezier(.16,1,.3,1) both; }
@keyframes screenIn{ from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:translateY(0);} }

.site-footer{
  text-align:center; font-size:11px; color:var(--ink-mute);
  padding:18px 12px 22px; border-top:1px solid var(--border-soft);
  font-family:var(--font-mono); letter-spacing:0.02em;
}

/* ---------- Typography ---------- */
h1,h2,h3{ font-family:var(--font-display); font-weight:600; line-height:1.15; color:var(--ink); letter-spacing:-0.01em; }
.kicker{
  font-family:var(--font-mono); font-size:11px; font-weight:600; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--accent); margin-bottom:14px;
  display:flex; align-items:center; gap:11px;
}
.kicker::before{ content:''; width:26px; height:1px; background:var(--accent); display:inline-block; }
.title-mega{ font-size:clamp(40px,7vw,68px); font-weight:600; line-height:1; margin-bottom:20px; letter-spacing:-0.025em; }
.title-mega em{ font-style:italic; font-weight:400; color:var(--primary); }
.lede{ font-family:var(--font-display); font-size:clamp(17px,2vw,21px); font-weight:400; line-height:1.5; color:var(--ink-soft); max-width:60ch; margin-bottom:28px; }
.section-title{ font-size:clamp(28px,4vw,40px); font-weight:600; margin-bottom:8px; }
p{ margin-bottom:14px; }
p.body-lg{ font-size:16.5px; line-height:1.7; }
.text-mute{ color:var(--ink-mute); }

/* ---------- Cards ---------- */
.card{
  background:var(--surface); border:1px solid var(--border-soft);
  border-radius:8px; padding:30px 34px; margin-bottom:22px; box-shadow:var(--shadow-sm); position:relative;
}
.card-accent::before{
  content:''; position:absolute; left:0; top:22px; bottom:22px; width:3px;
  background:var(--accent); border-radius:0 2px 2px 0;
}
.briefing{ font-family:var(--font-display); font-style:italic; font-size:17px; line-height:1.7; color:var(--ink); padding-left:18px; }
.briefing .speaker{
  display:block; font-family:var(--font-mono); font-style:normal; font-size:10px; font-weight:600;
  letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); margin-bottom:8px;
}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; gap:9px; padding:13px 26px; border:none; border-radius:4px;
  font-family:var(--font-body); font-size:13.5px; font-weight:600; letter-spacing:0.02em;
  cursor:pointer; transition:all .22s cubic-bezier(.4,0,.2,1); text-decoration:none;
}
.btn-primary{ background:var(--primary); color:#fff; }
.btn-primary:hover{ background:var(--primary-dark); transform:translateY(-1px); box-shadow:var(--shadow-md); }
.btn-ghost{ background:transparent; color:var(--primary); border:1.5px solid var(--border); }
.btn-ghost:hover{ border-color:var(--primary); }
.btn-arrow::after{ content:'\2192'; font-family:var(--font-mono); font-size:15px; }
.btn-row{ display:flex; gap:14px; flex-wrap:wrap; margin-top:22px; align-items:center; }

/* ---------- Inputs ---------- */
.field-label{ display:block; font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); margin-bottom:6px; }
.text-input{
  width:100%; padding:12px 14px; background:var(--surface-alt); border:1.5px solid var(--border);
  border-radius:4px; color:var(--ink); font-family:var(--font-body); font-size:15px;
}
.text-input:focus{ outline:none; border-color:var(--primary); background:#fff; }
.input-error{ display:none; margin-top:14px; padding:10px 14px; background:var(--error-bg); border-left:3px solid var(--error); color:var(--ink); font-size:13px; border-radius:4px; }

/* ---------- Room header ---------- */
.room-header{ display:flex; align-items:flex-start; gap:18px; margin-bottom:18px; }
.room-number{ font-family:var(--font-display); font-size:46px; font-weight:600; color:var(--accent); line-height:0.9; }
.room-location{ font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-mute); }
.room-name{ font-family:var(--font-display); font-size:26px; font-weight:600; color:var(--ink); }

/* ---------- Library ---------- */
.library-banner{
  display:flex; gap:14px; align-items:flex-start; background:var(--primary-soft);
  border:1px solid rgba(31,78,95,0.18); border-radius:8px; padding:16px 18px; margin-bottom:26px;
}
.library-banner svg{ width:22px; height:22px; stroke:var(--primary); fill:none; flex-shrink:0; margin-top:2px; }
.library-banner .warn{ display:block; margin-top:6px; color:var(--primary-dark); font-weight:600; font-size:13.5px; }
.lib-section{ margin-bottom:22px; }
.lib-section-title{ font-family:var(--font-display); font-size:19px; font-weight:600; color:var(--primary); margin-bottom:8px; }
.lib-bullets{ margin:8px 0 0 20px; }
.lib-bullets li{ margin-bottom:7px; }
.lib-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:12px; }
@media(max-width:600px){ .lib-grid{ grid-template-columns:1fr; } }
.lib-card{ background:var(--surface-alt); border:1px solid var(--border-soft); border-radius:6px; padding:14px 16px; }
.lib-card-sub{ font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent); }
.lib-card-title{ font-family:var(--font-display); font-size:16px; font-weight:600; margin:2px 0 5px; }
.lib-card-body{ font-size:13.5px; color:var(--ink-soft); }
.lib-table{ width:100%; border-collapse:collapse; margin-top:10px; font-size:14px; }
.lib-table th,.lib-table td{ text-align:left; padding:9px 11px; border-bottom:1px solid var(--border-soft); }
.lib-table th{ font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-mute); }
.lib-warning-bar{
  display:flex; gap:12px; align-items:center; background:var(--accent-soft);
  border:1px solid rgba(169,119,42,0.3); border-radius:8px; padding:14px 18px; margin:22px 0;
}
.lib-warning-bar svg{ width:22px; height:22px; stroke:var(--accent); fill:none; flex-shrink:0; }

/* ---------- Video ---------- */
.video-wrap{ position:relative; width:100%; padding-top:56.25%; border-radius:8px; overflow:hidden; box-shadow:var(--shadow-md); background:#000; margin:8px 0 8px; }
.video-wrap iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }
.fallback-line{ display:flex; gap:14px; flex-wrap:wrap; align-items:center; margin-top:14px; font-size:14px; color:var(--ink-soft); }

/* ---------- Puzzle: single choice ---------- */
.mc-question{ margin-bottom:24px; }
.mc-q-text{ font-weight:600; font-size:16px; margin-bottom:12px; }
.mc-option{
  display:flex; align-items:flex-start; gap:11px; width:100%; text-align:left;
  padding:13px 16px; margin-bottom:9px; background:var(--surface); border:1.5px solid var(--border);
  border-radius:6px; cursor:pointer; font-size:14.5px; line-height:1.5; transition:all .18s ease; font-family:var(--font-body); color:var(--ink);
}
.mc-option:hover{ border-color:var(--primary); }
.mc-option .dot{ width:18px; height:18px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; margin-top:1px; }
.mc-option.selected{ border-color:var(--primary); background:var(--primary-soft); }
.mc-option.selected .dot{ border-color:var(--primary); background:var(--primary); box-shadow:inset 0 0 0 3px var(--surface); }
.mc-option.correct{ border-color:var(--success); background:var(--success-bg); }
.mc-option.incorrect{ border-color:var(--error); background:var(--error-bg); }

/* ---------- Puzzle: lückentext + matching dropdowns ---------- */
.cloze{ font-size:16px; line-height:2.2; }
.cloze select, .match-select{
  font-family:var(--font-body); font-size:14px; font-weight:600; color:var(--primary);
  background:var(--accent-soft); border:1.5px solid var(--accent); border-radius:5px; padding:4px 8px; margin:0 2px;
}
.cloze select.ok, .match-select.ok{ border-color:var(--success); background:var(--success-bg); color:var(--success); }
.cloze select.bad, .match-select.bad{ border-color:var(--error); background:var(--error-bg); color:var(--error); }
.match-row{ display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--border-soft); flex-wrap:wrap; }
.match-left{ flex:1; min-width:200px; font-weight:600; font-size:15px; }
.match-left .lc-sub{ display:block; font-weight:400; font-size:13px; color:var(--ink-mute); }

/* ---------- Puzzle: multi-select grid ---------- */
.multi-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:11px; margin:20px 0; }
@media(max-width:600px){ .multi-grid{ grid-template-columns:1fr; } }
.multi-card{
  display:flex; align-items:flex-start; gap:11px; padding:15px 16px; background:var(--surface);
  border:1.5px solid var(--border); border-radius:6px; cursor:pointer; font-size:14px; line-height:1.45;
  text-align:left; transition:all .18s ease; font-family:var(--font-body); color:var(--ink);
}
.multi-card:hover{ border-color:var(--primary); }
.multi-card .box{ width:18px; height:18px; border-radius:4px; border:2px solid var(--border); flex-shrink:0; margin-top:1px; }
.multi-card.selected{ border-color:var(--primary); background:var(--primary-soft); }
.multi-card.selected .box{ border-color:var(--primary); background:var(--primary); }
.multi-card.correct{ border-color:var(--success); background:var(--success-bg); }
.multi-card.incorrect{ border-color:var(--error); background:var(--error-bg); }
.multi-card.missed{ border-color:var(--missed); background:var(--missed-bg); }

/* ---------- Puzzle: classify rows ---------- */
.classify-row{ display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border-soft); flex-wrap:wrap; }
.classify-text{ flex:1; min-width:210px; font-size:14.5px; }
.classify-btns{ display:flex; gap:8px; }
.classify-btn{
  font-family:var(--font-body); font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:5px;
  border:1.5px solid var(--border); background:var(--surface); color:var(--ink-soft); cursor:pointer; transition:all .18s ease;
}
.classify-btn:hover{ border-color:var(--primary); }
.classify-btn.active{ border-color:var(--primary); background:var(--primary); color:#fff; }
.classify-row.correct{ background:var(--success-bg); }
.classify-row.incorrect{ background:var(--error-bg); }

/* ---------- Status / hint ---------- */
.status{ padding:14px 18px; border-radius:6px; margin:18px 0; font-size:14px; display:none; }
.status.show{ display:block; animation:screenIn .3s ease both; }
.status .label{ display:block; font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; margin-bottom:4px; }
.status-success{ background:var(--success-bg); border-left:3px solid var(--success); }
.status-success .label{ color:var(--success); }
.status-warning{ background:var(--error-bg); border-left:3px solid var(--error); }
.status-warning .label{ color:var(--error); }
.hint-box{ display:none; background:var(--surface-alt); border:1px dashed var(--border); border-radius:6px; padding:14px 18px; margin-top:16px; font-size:14px; color:var(--ink-soft); }
.hint-box.show{ display:block; }
.hint-box .label{ display:block; font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); margin-bottom:5px; }
.hint-btn{ background:none; border:none; color:var(--primary); font-family:var(--font-body); font-size:13px; font-weight:600; cursor:pointer; text-decoration:underline; }

/* ---------- Reveal overlay ---------- */
.reveal-overlay{ position:fixed; inset:0; z-index:200; background:rgba(22,58,71,0.55); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; padding:20px; }
.reveal-overlay.show{ display:flex; animation:screenIn .3s ease both; }
.reveal-card{ background:var(--surface); border-radius:12px; box-shadow:var(--shadow-md); padding:40px 44px; max-width:440px; text-align:center; }
.reveal-letter{ font-family:var(--font-display); font-size:96px; font-weight:700; color:var(--accent); line-height:1; }
.reveal-caption{ font-family:var(--font-mono); font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-mute); margin-top:6px; }
.reveal-progress{ display:flex; gap:8px; justify-content:center; margin:22px 0 26px; }
.reveal-progress-letter{ width:38px; height:46px; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:22px; font-weight:700; color:var(--ink-mute); background:var(--surface-alt); border:1px solid var(--border); border-radius:5px; }
.reveal-progress-letter.lit{ color:#fff; background:var(--accent); border-color:var(--accent); }

/* ---------- Final ---------- */
.final-hero{ text-align:center; margin-bottom:34px; }
.final-code{ font-family:var(--font-display); font-size:clamp(54px,12vw,104px); font-weight:700; letter-spacing:0.08em; color:var(--accent); line-height:1; }
.final-actions{ display:grid; gap:14px; }
.final-action{ display:block; width:100%; text-align:left; background:var(--surface-alt); border:1.5px solid var(--border); border-radius:8px; padding:18px 20px; cursor:pointer; transition:all .2s ease; font-family:var(--font-body); }
.final-action:hover{ border-color:var(--primary); box-shadow:var(--shadow-sm); }
.final-action .label{ font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); font-weight:600; }
.final-action .title{ font-family:var(--font-display); font-size:18px; font-weight:600; color:var(--ink); margin:3px 0 4px; }
.final-action .desc{ font-size:13.5px; color:var(--ink-soft); }
.font-mono{ font-family:var(--font-mono); }
.muted-list{ margin:6px 0 0 18px; }
.muted-list li{ margin-bottom:6px; color:var(--ink-soft); font-size:14px; }

/* Erhard portrait card */
.erhard-card{ display:flex; gap:22px; align-items:flex-start; flex-wrap:wrap; background:var(--surface-alt); border:1px solid var(--border-soft); border-radius:10px; padding:22px 24px; }
.erhard-frame{ width:128px; flex-shrink:0; }
.erhard-frame svg{ width:128px; height:160px; display:block; }
.erhard-cap{ text-align:center; font-family:var(--font-mono); font-size:9px; letter-spacing:0.06em; color:var(--ink-mute); margin-top:6px; }
.erhard-body{ flex:1; min-width:240px; }
.erhard-body h3{ font-size:20px; margin-bottom:2px; }
.erhard-dates{ font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; color:var(--accent); margin-bottom:10px; }

/* House SVG */
.house-wrap{ text-align:center; margin:10px 0 4px; }
.house-wrap svg{ max-width:440px; width:100%; height:auto; }
</style>
</head>

<!-- ==== Eingebetteter Feiditor (Digitales Arbeitsblatt) ==== -->
<script type="text/template" id="feiditor-src">
<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feiditor</title>
<style>
  :root{
    --paper:#f7f4ec; --paper2:#fffdf8; --ink:#221f1a; --muted:#6f675a;
    --line:#ddd5c4; --accent:#6b4f2c; --accent2:#8a6a3c; --shadow:rgba(40,30,15,.10);
    --serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;
    --sans:"Avenir Next",Avenir,"Segoe UI","Helvetica Neue",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .screen{display:none; min-height:100vh}
  .screen.active{display:block}

  /* ---------- Start ---------- */
  #screen-start{display:none; place-items:center; padding:40px 20px}
  #screen-start.active{display:grid}
  .card{
    width:100%; max-width:440px; background:var(--paper2);
    border:1px solid var(--line); border-radius:14px; padding:40px 36px;
    box-shadow:0 18px 50px -28px var(--shadow);
  }
  .brand{font-family:var(--serif); font-size:13px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); margin:0 0 6px}
  .card h1{font-family:var(--serif); font-weight:600; font-size:30px; margin:0 0 4px; letter-spacing:.01em}
  .card p.sub{color:var(--muted); margin:0 0 26px; font-size:14.5px}
  label{display:block; font-size:12.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin:0 0 6px}
  .field{margin-bottom:18px}
  input[type=text]{
    width:100%; font-family:var(--serif); font-size:18px; color:var(--ink);
    background:var(--paper); border:1px solid var(--line); border-radius:9px;
    padding:11px 13px; outline:none; transition:border-color .15s, box-shadow .15s;
  }

<script>
/* ====================================================================== *
 *  Selbst gebauter, vollständig offline laufender Editor mit Tracking.   *
 *  Keine externen Bibliotheken, keine Netzwerkaufrufe.                   *
 * ====================================================================== */

/* ---------- Helvetica-Glyphbreiten (AFM, Einheiten/1000), nach Byte ---------- */
const HELV={32:278,33:278,34:355,35:556,36:556,37:889,38:667,39:191,40:333,41:333,42:389,43:584,44:278,45:333,46:278,47:278,48:556,49:556,50:556,51:556,52:556,53:556,54:556,55:556,56:556,57:556,58:278,59:278,60:584,61:584,62:584,63:556,64:1015,65:667,66:667,67:722,68:722,69:667,70:611,71:778,72:722,73:278,74:500,75:667,76:556,77:833,78:722,79:778,80:667,81:778,82:722,83:667,84:611,85:722,86:667,87:944,88:667,89:667,90:611,91:278,92:278,93:278,94:469,95:556,96:333,97:556,98:556,99:500,100:556,101:556,102:278,103:556,104:556,105:222,106:222,107:500,108:222,109:833,110:556,111:556,112:556,113:556,114:333,115:500,116:278,117:556,118:500,119:722,120:500,121:500,122:500,123:334,124:260,125:334,126:584,133:1000,145:222,146:222,147:333,148:333,149:350,150:556,151:1000,160:278,161:333,162:556,163:556,164:556,165:556,166:260,167:556,168:333,169:737,170:370,171:556,172:584,173:333,174:737,175:333,176:400,177:584,178:333,179:333,180:333,181:556,182:537,183:278,184:333,185:333,186:365,187:556,188:834,189:834,190:834,191:611,192:667,193:667,194:667,195:667,196:667,197:667,198:1000,199:722,200:667,201:667,202:667,203:667,204:278,205:278,206:278,207:278,208:722,209:722,210:778,211:778,212:778,213:778,214:778,215:584,216:778,217:722,218:722,219:722,220:722,221:667,222:667,223:611,224:556,225:556,226:556,227:556,228:556,229:556,230:889,231:500,232:556,233:556,234:556,235:556,236:278,237:278,238:278,239:278,240:556,241:556,242:556,243:556,244:556,245:556,246:556,247:584,248:611,249:556,250:556,251:556,252:556,253:500,254:556,255:500};
function afm(b){return HELV[b]!==undefined?HELV[b]:556;}
const CP1252={0x20AC:128,0x201A:130,0x0192:131,0x201E:132,0x2026:133,0x2020:134,0x2021:135,0x02C6:136,0x2030:137,0x0160:138,0x2039:139,0x0152:140,0x017D:142,0x2018:145,0x2019:146,0x201C:147,0x201D:148,0x2022:149,0x2013:150,0x2014:151,0x02DC:152,0x2122:153,0x0161:154,0x203A:155,0x0153:156,0x017E:158,0x0178:159};
function charByte(ch){const cp=ch.codePointAt(0);if(cp<=0xFF)return cp;if(CP1252[cp]!==undefined)return CP1252[cp];return 0x3F;}
function charWidth(ch,s){return afm(charByte(ch))/1000*s;}
function textWidth(str,s){let w=0;for(const ch of str)w+=charWidth(ch,s);return w;}
function encStr(str){let o="";for(const ch of str){const b=charByte(ch);if(b===0x28)o+="\\(";else if(b===0x29)o+="\\)";else if(b===0x5C)o+="\\\\";else o+=String.fromCharCode(b);}return o;}

function wrapText(text,maxW,size){
  const lines=[]; const paras=text.replace(/\r\n?/g,"\n").split("\n");
  for(const para of paras){
    if(para===""){lines.push("");continue;}
    const words=para.split(/( )/); let cur="";
    const pushWord=(w)=>{
      if(textWidth(w,size)>maxW){
        let chunk="";
        for(const ch of w){
          if(textWidth(chunk+ch,size)>maxW&&chunk!==""){
            if(cur!==""){lines.push(cur);cur="";} lines.push(chunk); chunk=ch;
          } else chunk+=ch;
        }
        if(chunk){if(cur!==""){lines.push(cur);cur="";} cur=chunk;} return;
      }
      if(textWidth(cur+w,size)>maxW&&cur!==""){lines.push(cur.replace(/ +$/,""));cur=w.trim()===""?"":w;}
      else cur+=w;
    };
    for(const w of words) pushWord(w);
    lines.push(cur.replace(/ +$/,""));
  }
  return lines;
}

function buildPdf(opts){
  const PW=595.28,PH=841.89, ML=56,MR=56,MT=56,MB=64;
  const HEAD_SIZE=13,BODY_SIZE=11,NOTE_SIZE=11,LEAD=15.5;
  const usableW=PW-ML-MR;
  const headerBaseline=PH-MT-HEAD_SIZE, ruleY=headerBaseline-6, bodyTop=ruleY-22, bodyBottom=MB+24;
  const allLines=wrapText(opts.body||"",usableW,BODY_SIZE);
  if(allLines.length===0) allLines.push("");
  const pages=[]; let idx=0;
  while(idx<allLines.length){
    const pageLines=[]; let y=bodyTop;
    while(idx<allLines.length&&y>=bodyBottom){pageLines.push({text:allLines[idx],y});y-=LEAD;idx++;}
    pages.push({lines:pageLines});
  }
  const nPages=pages.length;

  // roter Moodle-Hinweis unten auf der letzten Seite
  const noteText="Bitte diese PDF-Datei herunterladen und bei Moodle hochladen.";
  const noteLines=wrapText(noteText,usableW,NOTE_SIZE);
  const noteBottom=46; // Grundlinie der untersten Hinweiszeile

  const pageObjNum=(i)=>4+i*2, contObjNum=(i)=>5+i*2;
  const objects={};
  objects[1]="<< /Type /Catalog /Pages 2 0 R >>";
  objects[2]=`<< /Type /Pages /Count ${nPages} /Kids [${pages.map((_,i)=>`${pageObjNum(i)} 0 R`).join(" ")}] >>`;
  objects[3]="<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>";
  for(let i=0;i<nPages;i++){
    objects[pageObjNum(i)]=`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PW.toFixed(2)} ${PH.toFixed(2)}] /Resources << /Font << /F1 3 0 R >> >> /Contents ${contObjNum(i)} 0 R >>`;
    let s="0.5 w\n";
    s+=`BT /F1 ${HEAD_SIZE} Tf 0 0 0 rg ${ML} ${headerBaseline.toFixed(2)} Td (${encStr(opts.name||"")}) Tj ET\n`;
    s+=`${ML} ${ruleY.toFixed(2)} m ${(PW-MR).toFixed(2)} ${ruleY.toFixed(2)} l S\n`;
    const pl=pages[i].lines;
    if(pl.length){
      s+=`BT /F1 ${BODY_SIZE} Tf 0 0 0 rg ${ML} ${pl[0].y.toFixed(2)} Td ${LEAD} TL\n`;
      for(let j=0;j<pl.length;j++){if(j>0)s+="T*\n"; s+=`(${encStr(pl[j].text)}) Tj\n`;}
      s+="ET\n";
    }
    if(i===nPages-1){ // roter Hinweis nur auf der letzten Seite
      const topY=noteBottom+(noteLines.length-1)*LEAD;
      s+=`BT /F1 ${NOTE_SIZE} Tf 0.78 0.05 0.05 rg ${ML} ${topY.toFixed(2)} Td ${LEAD} TL\n`;
      for(let j=0;j<noteLines.length;j++){if(j>0)s+="T*\n"; s+=`(${encStr(noteLines[j])}) Tj\n`;}
      s+="ET\n";
    }
    objects[contObjNum(i)]={stream:s};
  }
  let pdf="%PDF-1.7\n%\u00E2\u00E3\u00CF\u00D3\n";
  if(opts.trackB64) pdf+=`%TRACKDATA ${opts.trackB64}\n`;
  const offsets={}; const maxNum=3+nPages*2;
  for(let n=1;n<=maxNum;n++){
    offsets[n]=pdf.length; const o=objects[n];
    if(o&&o.stream!==undefined){const st=o.stream;pdf+=`${n} 0 obj\n<< /Length ${st.length} >>\nstream\n${st}endstream\nendobj\n`;}
    else pdf+=`${n} 0 obj\n${o}\nendobj\n`;
  }
  const xrefStart=pdf.length;
  pdf+=`xref\n0 ${maxNum+1}\n0000000000 65535 f \n`;
  for(let n=1;n<=maxNum;n++) pdf+=String(offsets[n]).padStart(10,"0")+" 00000 n \n";
  pdf+=`trailer\n<< /Size ${maxNum+1} /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF`;
  return pdf;
}

/* ---------------- gemeinsame Krypto- & Auswertungs-Funktionen ---------------- *
 * Diese werden per toString() in die Lehrkraft-Seite (data:-Link) eingebettet,  *
 * damit es nur EINE Quelle der Wahrheit gibt.                                   */
function bytesToB64(bytes){let bin="";const CH=0x8000;for(let i=0;i<bytes.length;i+=CH)bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+CH));return btoa(bin);}
function b64ToBytes(b64){const bin=atob(b64);const out=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)out[i]=bin.charCodeAt(i);return out;}
async function _key(codeStr,usage){const mat=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(codeStr));return crypto.subtle.importKey("raw",mat,{name:"AES-GCM"},false,usage);}
async function aesEncrypt(plain,codeStr){const iv=crypto.getRandomValues(new Uint8Array(12));const key=await _key(codeStr,["encrypt"]);const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(plain));return bytesToB64(iv)+":"+bytesToB64(new Uint8Array(ct));}
async function aesDecrypt(bundle,codeStr){const parts=bundle.split(":");const iv=b64ToBytes(parts[0]);const ct=b64ToBytes(parts[1]);const key=await _key(codeStr,["decrypt"]);const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);return new TextDecoder().decode(pt);}
function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function classify(isVisible,src,gap){
  const COL={plain:"#23201b",paste:"#b3261e",fast:"#c2710c",slow:"#1f7a34",system:"#9c948a"};
  if(!isVisible) return COL.plain;
  if(src==="s") return COL.system;           // System-Text (vorbefüllte Aufgaben) -> gedämpftes Grau
  if(src==="p") return COL.paste;            // aus Zwischenablage -> rot
  if(gap>=0&&gap<=15) return COL.paste;      // <= 0,015 s getippt -> rot
  if(gap>15&&gap<=70) return COL.fast;       // 0,015-0,07 s -> orange
  return COL.slow;                           // > 0,07 s / erstes Zeichen -> grün
}
function renderAnalysis(payload){
  const t=payload.t, m=payload.m||[];
  let html=""; let total=0,red=0,orange=0,green=0,sysCount=0;
  const WS=/\s/;
  for(let i=0;i<t.length;i++){
    const ch=t[i]; const isV=!WS.test(ch);
    const mark=m[i]||["t",-1]; const src=mark[0]; const gap=mark[1];
    const col=classify(isV,src,gap);
    if(isV){
      if(src==="s"){ sysCount++; }
      else{
        total++;
        if(col==="#b3261e") red++;
        else if(col==="#c2710c") orange++;
        else green++;
      }
    }
    html+=`<span style="color:${col}">${esc(ch)}</span>`;
  }
  const pct=(x)=>total?Math.round(x/total*100):0;
  const legend=
    '<div class="legend">'+
      '<span><i class="sw" style="background:#9c948a"></i>vorbefüllte Aufgabenstellung (kein Schülertext)</span>'+
      '<span><i class="sw" style="background:#b3261e"></i>eingefügt oder ≤ 0,015 s getippt</span>'+
      '<span><i class="sw" style="background:#c2710c"></i>0,015–0,07 s nach vorherigem Zeichen getippt</span>'+
      '<span><i class="sw" style="background:#1f7a34"></i>&gt; 0,07 s nach vorherigem Zeichen getippt</span>'+
    '</div>';
  const stat=`<p class="stat">Schülertext (ohne vorbefüllte Aufgaben): ${total} Zeichen · rot: ${red} (${pct(red)} %) · orange: ${orange} (${pct(orange)} %) · grün: ${green} (${pct(green)} %) · vorbefüllt: ${sysCount} Zeichen</p>`;
  let escapeBlock="";
  if(payload.e){
    escapeBlock=
      '<div style="background:#fffdf8;border:1px solid #ddd5c4;border-radius:10px;padding:18px 22px;margin:0 0 18px;font-family:Iowan Old Style,Palatino,Georgia,serif;font-size:15.5px;line-height:1.55">'+
        '<div style="font-family:Avenir Next,system-ui,sans-serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#6f675a;margin-bottom:10px">Escape-Room-Daten</div>'+
        '<div><strong>Name:</strong> '+esc(payload.e.fn||"")+' '+esc(payload.e.ln||"")+'</div>'+
        '<div><strong>Geburtsdatum:</strong> '+esc(payload.e.bd||"")+'</div>'+
        '<div><strong>Bestätigungscode:</strong> '+esc(payload.e.cd||"")+'</div>'+
      '</div>';
  }
  const head=`<div class="nmeta">Verfasser:in — ${esc(payload.n||"")}</div>`;
  return head+escapeBlock+legend+stat+`<div class="analysis">${html}</div>`;
}

/* ---------------- gemeinsame Krypto-Funktionen werden nur noch lokal genutzt ---------------- */

/* ----------------------- geheime Code-Bildung (Lehrkraft) ----------------------- */
function _kf(s){const n=(s.match(/\p{L}/gu)||[]).length;return String(n*(0x230+0x220));}

/* ------------------------------ Tracking ------------------------------ */
let prevValue="";
let recs=[];          // pro Zeichen: {src:'t'|'p', t:ms}
let justPasted=false; // wird durch paste/drop gesetzt, nach einem input-Event geleert

function reconcile(newVal,pasted,now){
  const a=prevValue,b=newVal; const minL=Math.min(a.length,b.length);
  let p=0; while(p<minL&&a[p]===b[p])p++;
  let s=0; while(s<minL-p&&a[a.length-1-s]===b[b.length-1-s])s++;
  const removed=a.length-p-s;
  const inserted=b.slice(p,b.length-s);
  const ins=inserted.split("").map(()=>({src:pasted?"p":"t",t:now}));
  recs.splice(p,removed,...ins);
  if(recs.length!==b.length){ // Sicherheitsnetz gegen Desync
    recs=b.split("").map(()=>({src:"t",t:now}));
  }
  prevValue=newVal;
}

function buildPayload(name,text){
  if(recs.length!==text.length){ // letzte Absicherung
    const now=Date.now(); recs=text.split("").map(()=>({src:"t",t:now}));
  }
  const m=[];
  for(let i=0;i<text.length;i++){
    const gap=(i===0)?-1:(recs[i].t-recs[i-1].t);
    m.push([recs[i].src,gap]);
  }
  return {n:name,t:text,m};
}

function sanitize(s){return (s||"").replace(/[^\p{L}\p{N}_-]/gu,"_").slice(0,40)||"Datei";}
function asciiName(s){
  return (s||"")
    .replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue")
    .replace(/Ä/g,"Ae").replace(/Ö/g,"Oe").replace(/Ü/g,"Ue").replace(/ß/g,"ss")
    .normalize("NFKD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^A-Za-z0-9_-]/g,"_").replace(/_+/g,"_").replace(/^_|_$/g,"")
    .slice(0,40) || "Datei";
}
function fileSafe(s){return (s||"").replace(/[\/\\:*?"<>|\u0000-\u001f]/g,"").replace(/\s+/g," ").trim().slice(0,90)||"Datei";}
function downloadBlob(blob,filename){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}

/* Export: erzeugt NUR die Text-PDF (mit rotem Moodle-Hinweis); die Zeiterfassungs- und
   Escape-Room-Daten stecken verschlüsselt (als %TRACKDATA) im PDF und sind nur mit dem
   Feiditor-Code (Anzahl Buchstaben im Vornamen × 1104) durch die Lehrkraft auslesbar. */
$("export-btn").addEventListener("click",async()=>{
  const btn=$("export-btn"); const text=ed.value;
  const name=studentVorname+" "+studentNachname;
  btn.disabled=true; const old=btn.textContent; btn.textContent="Erzeuge PDF…";
  try{
    const payload=buildPayload(name,text);
    // Escape-Room-Daten zusätzlich (versteckt) ins PDF einbetten
    if(window.__ESCAPE_DATA__){
      payload.e={
        fn:window.__ESCAPE_DATA__.firstName||"",
        ln:window.__ESCAPE_DATA__.lastName||"",
        bd:window.__ESCAPE_DATA__.birthDate||"",
        cd:window.__ESCAPE_DATA__.code||""
      };
    }
    const code=_kf(studentVorname);              // Feiditor-Code: NICHT der Escape-Room-Code
    const bundle=await aesEncrypt(JSON.stringify(payload),code);

    const pdfName=fileSafe("Text von "+studentVorname)+".pdf";

    // PDF: Text + roter Moodle-Hinweis; Tracking- und Escape-Daten verschlüsselt als %TRACKDATA-Reserve
    const pdfStr=buildPdf({name,body:text,trackB64:bundle});
    const u8=new Uint8Array(pdfStr.length);
    for(let i=0;i<pdfStr.length;i++)u8[i]=pdfStr.charCodeAt(i)&0xFF;

    downloadBlob(new Blob([u8],{type:"application/pdf"}), pdfName);

    btn.textContent="PDF erstellt ✓";
    setTimeout(()=>{ btn.textContent=old; }, 2200);
  }catch(err){ alert("Fehler beim Erzeugen der PDF: "+err.message); btn.textContent=old; }
  finally{ btn.disabled=false; }
});

/* Lehrkraft: PDF laden + Code */
let teacherBundle=null;
function readPdfFile(file){
  $("teacher-err").textContent=""; $("result").innerHTML="";
  $("code-area").classList.add("hidden"); teacherBundle=null;
  const fr=new FileReader();
  fr.onload=()=>{
    const bytes=new Uint8Array(fr.result);
    let str=""; for(let i=0;i<bytes.length;i++) str+=String.fromCharCode(bytes[i]);
    const mm=str.match(/%TRACKDATA (\S+)/);
    if(!mm){$("teacher-err").textContent="In dieser PDF wurden keine Tracking-Daten gefunden.";return;}
    teacherBundle=mm[1];
    $("code-area").classList.remove("hidden");
    setTimeout(()=>$("code-input").focus(),40);
  };
  fr.onerror=()=>{$("teacher-err").textContent="Datei konnte nicht gelesen werden.";};
  fr.readAsArrayBuffer(file);
}
$("pdf-input").addEventListener("change",e=>{const f=e.target.files[0];if(f)readPdfFile(f);});

function buildPrefill(tasks){
  const lines=[];
  tasks.forEach((task,i)=>{
    lines.push("Aufgabe "+(i+1));
    lines.push(task);
    for(let k=0;k<8;k++) lines.push("");   // 8 Leerzeilen Lösungsraum
  });
  return lines.join("\n");
}
(function autoStartFromEscape(){
  const D=window.__ESCAPE_DATA__;
  if(!D) return;                                   // ohne Daten: normaler Anmeldebildschirm
  studentVorname=(D.firstName||"").trim();
  studentNachname=(D.lastName||"").trim();
  $("who-name").textContent=(studentVorname+" "+studentNachname).trim();
  const tasks=Array.isArray(D.tasks)?D.tasks:[];
  const prefill=tasks.length?buildPrefill(tasks):"";
  const now=Date.now();
  ed.value=prefill;
  prevValue=prefill;
  recs=prefill.split("").map(()=>({src:"s",t:now}));   // vorbefüllter Text = System (grau, nicht gezählt)
  updateCharcount();
  show("screen-editor");
  // Cursor an den Anfang des ersten Lösungsbereichs setzen (nach Aufgabe 1)
  setTimeout(()=>{
    ed.focus();
    const firstGap=prefill.indexOf("\n\n");
    const pos=firstGap>=0?firstGap+2:prefill.length;
    try{ ed.setSelectionRange(pos,pos); }catch(e){}
  },50);
})();

/* ============================================================
   MINI PDF WRITER (self-contained, no dependencies)
   PDF 1.4 · Helvetica + Helvetica-Bold (WinAnsi)
   ============================================================ */
const WIN_ANSI_MAP = {
  'ä':0xE4,'ö':0xF6,'ü':0xFC,'Ä':0xC4,'Ö':0xD6,'Ü':0xDC,'ß':0xDF,
  '€':0x80,'‚':0x82,'„':0x84,'…':0x85,'†':0x86,'‡':0x87,
  '‰':0x89,'‹':0x8B,"\u2018":0x91,"\u2019":0x92,"\u201C":0x93,"\u201D":0x94,
  '•':0x95,'–':0x96,'—':0x97,'™':0x99,'›':0x9B,
  '¡':0xA1,'«':0xAB,'»':0xBB,'·':0xB7,'×':0xD7,'°':0xB0,
  '²':0xB2,'³':0xB3,'½':0xBD,'¼':0xBC,'¾':0xBE,'¿':0xBF,
};
const FALLBACK_MAP = {
  '→':'->','←':'<-','↑':'^','↓':'v','✓':'v','✗':'x','✕':'x','★':'*','☆':'*',
  '\u00A0':' ','\u2009':' ','\u200B':'',
};
function encodeWinAnsi(str){
  const bytes=[];
  for(const ch of str){
    const code=ch.charCodeAt(0);
    if(code<128) bytes.push(code);
    else if(WIN_ANSI_MAP[ch]!==undefined) bytes.push(WIN_ANSI_MAP[ch]);
    else if(FALLBACK_MAP[ch]!==undefined){ for(const sub of FALLBACK_MAP[ch]) bytes.push(sub.charCodeAt(0)&0xFF); }
    else if(code<=255) bytes.push(code);
    else bytes.push(0x3F);
  }
  return bytes;
}
const HELV_W=(()=>{
  const w=new Array(256).fill(500);
  const widths={' ':278,'!':278,'"':355,'#':556,'$':556,'%':889,'&':667,"'":191,'(':333,')':333,'*':389,'+':584,',':278,'-':333,'.':278,'/':278,'0':556,'1':556,'2':556,'3':556,'4':556,'5':556,'6':556,'7':556,'8':556,'9':556,':':278,';':278,'<':584,'=':584,'>':584,'?':556,'@':1015,'A':667,'B':667,'C':722,'D':722,'E':667,'F':611,'G':778,'H':722,'I':278,'J':500,'K':667,'L':556,'M':833,'N':722,'O':778,'P':667,'Q':778,'R':722,'S':667,'T':611,'U':722,'V':667,'W':944,'X':667,'Y':667,'Z':611,'[':278,'\\':278,']':278,'^':469,'_':556,'`':333,'a':556,'b':556,'c':500,'d':556,'e':556,'f':278,'g':556,'h':556,'i':222,'j':222,'k':500,'l':222,'m':833,'n':556,'o':556,'p':556,'q':556,'r':333,'s':500,'t':278,'u':556,'v':500,'w':722,'x':500,'y':500,'z':500,'{':334,'|':260,'}':334,'~':584,'ä':556,'ö':556,'ü':556,'Ä':667,'Ö':778,'Ü':722,'ß':611,'€':556,'–':556,'—':1000,'«':556,'»':556,'·':278,'°':400,'•':350};
  for(const k in widths){ const code=WIN_ANSI_MAP[k]!==undefined?WIN_ANSI_MAP[k]:k.charCodeAt(0); if(code<256) w[code]=widths[k]; }
  return w;
})();
function pdfStringWidth(str,fontSize,isBold){
  const bytes=encodeWinAnsi(str); let total=0;
  for(const b of bytes) total += (HELV_W[b]||500)*(isBold?1.04:1);
  return total*fontSize/1000;
}
class PdfDoc{
  constructor(){ this.pages=[]; this.pageW=595; this.pageH=842; this.margin=56; this.cursorY=0; this.currentContent=[]; }
  startPage(){ this.cursorY=this.pageH-this.margin; this.currentContent=[]; }
  endPage(){ this.pages.push({content:this.currentContent.join('\n')}); }
  _escapedString(str){
    const bytes=encodeWinAnsi(str); let s='(';
    for(const b of bytes){ if(b===0x28||b===0x29||b===0x5C) s+='\\'; s+=String.fromCharCode(b); }
    return s+')';
  }
  text(str,x,y,fontSize,isBold,color){
    const fontKey=isBold?'F2':'F1'; const c=color||[0,0,0]; const pdfStr=this._escapedString(str);
    this.currentContent.push(`${c[0]/255} ${c[1]/255} ${c[2]/255} rg\nBT\n/${fontKey} ${fontSize} Tf\n${x} ${y} Td\n${pdfStr} Tj\nET`);
  }
  rect(x,y,w,h,fill,stroke){
    let cmd='';
    if(fill) cmd+=`${fill[0]/255} ${fill[1]/255} ${fill[2]/255} rg\n`;
    if(stroke) cmd+=`${stroke[0]/255} ${stroke[1]/255} ${stroke[2]/255} RG\n`;
    cmd+=`${x} ${y} ${w} ${h} re\n`;
    if(fill&&stroke) cmd+='B'; else if(fill) cmd+='f'; else if(stroke) cmd+='S';
    this.currentContent.push(cmd);
  }
  line(x1,y1,x2,y2,color,width){
    const c=color||[0,0,0];
    this.currentContent.push(`${c[0]/255} ${c[1]/255} ${c[2]/255} RG\n${width||0.5} w\n${x1} ${y1} m ${x2} ${y2} l S`);
  }
  paragraph(str,x,y,width,fontSize,isBold,color,leading){
    if(!leading) leading=fontSize*1.4;
    const words=String(str).split(/\s+/); let line=''; let curY=y;
    for(const word of words){
      if(!word) continue;
      const test=line?line+' '+word:word;
      if(pdfStringWidth(test,fontSize,isBold)<=width){ line=test; }
      else{
        if(line){ this.text(line,x,curY,fontSize,isBold,color); curY-=leading; line=word; }
        else{ this.text(word,x,curY,fontSize,isBold,color); curY-=leading; }
      }
    }
    if(line){ this.text(line,x,curY,fontSize,isBold,color); curY-=leading; }
    return curY;
  }
  build(){
    const objects=[null,null,
      '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>',
      '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>'];
    const pageIds=[];
    for(const page of this.pages){
      objects.push(`<< /Length ${page.content.length} >>\nstream\n${page.content}\nendstream`);
      const contentId=objects.length;
      objects.push(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${this.pageW} ${this.pageH}] /Resources << /Font << /F1 3 0 R /F2 4 0 R >> >> /Contents ${contentId} 0 R >>`);
      pageIds.push(objects.length);
    }
    objects[1]=`<< /Type /Pages /Kids [${pageIds.map(i=>i+' 0 R').join(' ')}] /Count ${pageIds.length} >>`;
    objects[0]='<< /Type /Catalog /Pages 2 0 R >>';
    let pdf='%PDF-1.4\n%\xC4\xC5\xC6\xC7\n'; const offsets=[0];
    for(let i=0;i<objects.length;i++){ offsets.push(pdf.length); pdf+=`${i+1} 0 obj\n${objects[i]}\nendobj\n`; }
    const xrefOffset=pdf.length;
    pdf+=`xref\n0 ${objects.length+1}\n0000000000 65535 f \n`;
    for(let i=1;i<=objects.length;i++) pdf+=String(offsets[i]).padStart(10,'0')+' 00000 n \n';
    pdf+=`trailer\n<< /Size ${objects.length+1} /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF\n`;
    return pdf;
  }
  toBase64(trailerComment){ let pdf=this.build(); if(trailerComment) pdf+=trailerComment; return btoa(pdf); }
}

function generateOverviewPdf(){
  const doc=new PdfDoc();
  const W=doc.pageW,H=doc.pageH,M=doc.margin; const CW=W-2*M;
  const PRIMARY=[31,78,95], ACCENT=[169,119,42], RED=[177,68,47], GREEN=[47,125,65], MUTE=[108,120,136], TEXT=[29,39,51];

  function header(title){
    doc.startPage();
    doc.rect(0,H-72,W,72,PRIMARY);
    doc.text(title,M,H-38,18,true,[255,255,255]);
    doc.text('Politik & Wirtschaft · Soziale Marktwirtschaft · Escape-Room „Stunde Null"',M,H-58,9,false,[214,226,228]);
    return H-72-22;

/* ============================================================
   DOWNLOAD-HELFER
   ============================================================ */
function translit(s){
  return (s||'').replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue')
    .replace(/Ä/g,'Ae').replace(/Ö/g,'Oe').replace(/Ü/g,'Ue').replace(/ß/g,'ss')
    .replace(/[^a-zA-Z0-9-]/g,'');
}
function downloadPdfBase64(b64,filename){
  const binary=atob(b64); const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  const blob=new Blob([bytes],{type:'application/pdf'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a'); link.href=url; link.download=filename;
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
  setTimeout(()=>URL.revokeObjectURL(url),1200);
}
window.downloadOverviewPDF=()=>{
  try{
    const b64=generateOverviewPdf();
    const name=translit(state.lastName)||'Schueler';
    const filename=`Ueberblick_${name}_${state.code}.pdf`;
    const binary=atob(b64); const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    const blob=new Blob([bytes],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    // 1) PDF in neuem Tab öffnen (die Abschlussseite bleibt im Ausgangstab bestehen)
    window.open(url,'_blank');
    // 2) Dieselbe Datei zusätzlich herunterladen
    const link=document.createElement('a');
    link.href=url; link.download=filename;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
    // Object-URL erst spät freigeben, damit neuer Tab und Download sicher fertig laden
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  }catch(e){ console.error(e); alert('Konnte die Datei nicht erzeugen: '+e.message); }
};
window.downloadReflexionPDF=()=>{
  try{
    const b64=generateReflexionPdf();
    const name=translit(state.lastName)||'Schueler';
    downloadPdfBase64(b64,`Reflexion_${name}_${state.code}.pdf`);
  }catch(e){ console.error(e); alert('Konnte die Datei nicht erzeugen: '+e.message); }
};
window.openFeiditor=()=>{
  try{
    const tplEl=document.getElementById('feiditor-src');
    if(!tplEl){ alert('Der Feiditor konnte nicht geladen werden.'); return; }
    // Eingebetteten Feiditor-Quelltext holen und die escapten Script-End-Tags wiederherstellen
    let html=tplEl.textContent.replace(/<\\\/script>/gi,'<\/script>');
    // Escape-Room-Daten + die ersten sechs Aufgaben in den Feiditor injizieren (vor </head>)
    const data={
      firstName: state.firstName,
      lastName:  state.lastName,
      birthDate: state.birthDate,
      code:      state.code,
      tasks:     REFLECT_TASKS.slice(0,6)
    };
    const inject='<script>window.__ESCAPE_DATA__='+JSON.stringify(data).replace(/</g,'\\u003c')+';<\/script>';
    if(html.indexOf('</head>')!==-1) html=html.replace('</head>', inject+'\n</head>');
    else html=inject+html;
    // Per document.write öffnen, damit der sichere Kontext (crypto.subtle) erhalten bleibt.
    // Ein Blob-URL würde den secure context verlieren -> Verschlüsselung schlägt fehl.
    const win=window.open('','_blank');
    if(!win){ alert('Bitte erlaube Pop-ups für diese Seite, damit sich das digitale Arbeitsblatt öffnen kann.'); return; }
    win.document.open();
    win.document.write(html);
    win.document.close();
  }catch(e){ console.error(e); alert('Das digitale Arbeitsblatt konnte nicht geöffnet werden: '+e.message); }
};
window.copyCode=async()=>{
  try{ await navigator.clipboard.writeText(state.code);
    const d=document.getElementById('copyDesc'); if(d) d.innerHTML='Code in die Zwischenablage kopiert. Trage ihn in die Moodle-Aufgabe ein.';
  }catch(e){ const d=document.getElementById('copyDesc'); if(d) d.innerHTML='Code: <strong class="font-mono">'+state.code+'</strong> – bitte manuell kopieren.'; }

    else if(state.solved[i] || sc==='room'+(i+1)

      || (sc.startsWith('lib') && parseInt((sc.match(/\d+/)||[0])[0])>i+1)
      || sc==='final') lib.classList.add('visited');

    sealsBox.appendChild(s);
  }
}

window.maskBirth=(el)=>{
  let v=el.value.replace(/[^0-9]/g,'').slice(0,8);
  let out=v;
  if(v.length>4) out=v.slice(0,2)+'.'+v.slice(2,4)+'.'+v.slice(4);
  else if(v.length>2) out=v.slice(0,2)+'.'+v.slice(2);
  el.value=out;
};
window.submitStart=()=>{
  const fn=document.getElementById('firstNameInput').value.trim();
  const ln=document.getElementById('lastNameInput').value.trim();
  const bd=document.getElementById('birthInput').value.trim();
  const err=document.getElementById('startError');
  function showErr(msg){ err.style.display='block'; err.textContent=msg; }
  if(fn.length<2||ln.length<2){ showErr('Bitte trage deinen vollen Vor- und Nachnamen ein (jeweils mindestens 2 Zeichen).'); return; }
  const m=bd.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
  if(!m){ showErr('Bitte gib dein Geburtsdatum im Format TT.MM.JJJJ ein (z. B. 07.03.2006).'); return; }
  const dd=parseInt(m[1],10), mm=parseInt(m[2],10), yyyy=parseInt(m[3],10);
  if(dd<1||dd>31||mm<1||mm>12||yyyy<1900||yyyy>2025){ showErr('Das Geburtsdatum scheint nicht zu stimmen. Bitte prüfe Tag, Monat und Jahr.'); return; }
  state.firstName=fn; state.lastName=ln; state.birthDate=bd;
  const digits=m[1]+m[2]+m[3];
  state.code=computeCode(digits);
  renderIntro();
};

const LIB2ALT_CONTENT=`
  <div class="lib-section">
    <div class="lib-section-title">Das Fundament der Sozialen Marktwirtschaft</div>
    <p>Marenia hat sich entschieden: weder zurück zur Kommandowirtschaft noch hinein in einen Markt ganz ohne Regeln. Doch eine Wirtschaftsordnung braucht ein theoretisches Fundament – und das liefert eine Denkrichtung der 1930er- und 1940er-Jahre: der <strong>Ordoliberalismus</strong> der <strong>Freiburger Schule</strong>.</p>
  </div>
  <div class="lib-section">
    <div class="lib-section-title">Die Freiburger Schule (Walter Eucken)</div>
    <p>Ihr wichtigster Kopf war der Ökonom <strong>Walter Eucken</strong>. Der Name kommt vom lateinischen <em>ordo</em> = „Ordnung". Das ist das Programm: Im Mittelpunkt steht nicht der einzelne Tausch, sondern die <strong>Ordnung</strong>, in der getauscht wird.</p>
  </div>
  <div class="lib-section">
    <div class="lib-section-title">Die Diagnose: warum nicht einfach „freier Markt"?</div>
    <p>Der klassische Liberalismus vertraute darauf, dass sich ein freier Markt von selbst einstellt, wenn der Staat sich heraushält (<em>Laissez-faire</em>). In Wirklichkeit entstanden daraus aber Kartelle und Monopole – Eucken nannte das die <strong>„Vermachtung"</strong> der Wirtschaft: Wenige Mächtige schalteten den Wettbewerb aus. Die Gegenrichtung, die Zentralverwaltungswirtschaft, lehnte Eucken ebenfalls ab, weil sie die Macht beim Staat ballt.</p>
  </div>
  <div class="lib-section">
    <div class="lib-section-title">Die Kernidee: die Wettbewerbsordnung muss gestaltet werden</div>
    <p>Ein funktionierender Wettbewerb entsteht <strong>nicht von selbst</strong>. Eine <strong>Wettbewerbsordnung</strong> muss bewusst geschaffen und geschützt werden – wie die Spielregeln eines Spiels, ohne die der Stärkste gewinnt statt des Besten.</p>
  </div>
  <div class="lib-section">
    <div class="lib-section-title">Der Staat als Schiedsrichter</div>
    <p>Daraus folgt ein <strong>starker, aber begrenzter Staat</strong>: stark gegen Machtballung (Kartelle, Monopole), aber zurückhaltend im laufenden Geschäft. Er setzt nur den <strong>Rahmen</strong> und greift nicht in einzelne Marktentscheidungen ein – wie ein <strong>Schiedsrichter</strong>, der die Regeln überwacht, aber nicht selbst mitspielt.</p>
  </div>
  <div class="lib-section">
    <div class="lib-section-title">Ausblick</div>
    <p>Auf diesem Fundament stehen die konkreten Prinzipien (Räume 3 und 4). Verbindet man es mit dem Gedanken des sozialen Ausgleichs, entsteht das Modell, das Marenia wählt: die <strong>Soziale Marktwirtschaft</strong>.</p>
  </div>
`;

function triggerReveal(roomIdx){
  state.solved[roomIdx]=true; state.letters[roomIdx]=CODE_WORD[roomIdx];

  document.getElementById('revealLetter').textContent=CODE_WORD[roomIdx];
  document.getElementById('revealCaption').textContent=`Buchstabe ${roomIdx+1} von 6 freigeschaltet`;
  const progBox=document.getElementById('revealProgress'); progBox.innerHTML='';
  for(let i=0;i<6;i++){ const span=document.createElement('span'); span.className='reveal-progress-letter'+(state.solved[i]?' lit':''); span.textContent=state.solved[i]?CODE_WORD[i]:'·'; progBox.appendChild(span); }
  const btn=document.getElementById('revealContinue'); const isLast=roomIdx===5;
  btn.textContent=isLast?'Gründungsplan ratifizieren':'Nächste Bibliothek betreten';
  btn.onclick=()=>{ overlay.classList.remove('show'); setTimeout(()=>{ if(isLast) renderFinal(); else goLibrary(roomIdx+2); },250); };
  overlay.classList.add('show');
}
window.goRoom=(n)=>{
  window.scrollTo({top:0,behavior:'instant'});
  switch(n){ case 1:renderRoom1();break; case 2:renderRoom2();break; case 3:renderRoom3();break; case 4:renderRoom4();break; case 5:renderRoom5();break; case 6:renderRoom6();break; }
};

/* ============================================================
   FINAL
   ============================================================ */
function renderFinal(){

  if(!state.completedAt) state.completedAt=new Date();
  renderSeals(); window.scrollTo({top:0,behavior:'instant'});
  const totalErrors=state.mistakes.reduce((a,m)=>a+(m&&m.errors?m.errors.length:0),0);

    ? `Alle sechs Räume im ersten Versuch fehlerfrei – stark, ${escapeHtml(state.firstName)}.`
    : `Du hast ${perfectRooms} von 6 Räumen im ersten Versuch fehlerfrei gelöst (${totalErrors} Erstversuchs-Fehler). Im Überblick findest du alle mit Erklärung.`;

        <rect x="74" y="90" width="292" height="58" fill="#a9772a"/>
        <text x="220" y="124" text-anchor="middle" fill="#ffffff" font-family="Inter,sans-serif" font-size="12.5" font-weight="600">Säulen · konstituierende &amp; regulierende Prinzipien</text>
        <rect x="74" y="152" width="292" height="52" fill="#163a47"/>
        <text x="220" y="183" text-anchor="middle" fill="#ffffff" font-family="Inter,sans-serif" font-size="12.5" font-weight="600">Fundament · Ordoliberalismus</text>
        <rect x="60" y="208" width="320" height="14" fill="#6c7888"/>
        <text x="220" y="218" text-anchor="middle" fill="#ffffff" font-family="IBM Plex Mono,monospace" font-size="9" letter-spacing="2">HAUS DER SOZIALEN MARKTWIRTSCHAFT</text>
      </svg>
    </div>

    <div class="card">
      <h2 style="font-size:22px; margin-bottom:6px;">Zwei Schritte zum Abschluss</h2>
      <p class="text-mute" style="font-size:13.5px; margin-bottom:20px;">Beide sind nötig, damit deine Lehrkraft den Abschluss verbuchen kann.</p>
      <div class="final-actions">
        <button class="final-action" onclick="downloadOverviewPDF()">
          <div class="label">Schritt 1 · Pflicht</div>
          <div class="title">„Überblick deiner Antworten &amp; Erläuterungen" herunterladen</div>
          <div class="desc">Persönliche PDF mit deinem Namen, Geburtsdatum, Code und Abschlusszeit – plus einer Seite mit Lösungserläuterungen. <strong style="color:var(--primary)">Lade sie in Moodle hoch.</strong></div>
        </button>
        <button class="final-action" onclick="openFeiditor()">

      </div>
    </div>

            Erhard war Ökonom und Politiker und gilt als das <strong>politische Gesicht der Sozialen Marktwirtschaft</strong>. Mit der Währungsreform von 1948 gab er die Preise frei und beendete die staatliche Bewirtschaftung. Als erster Bundeswirtschaftsminister der Bundesrepublik (1949–1963) wurde er zum „Vater des Wirtschaftswunders"; sein Leitbild <strong>„Wohlstand für alle"</strong> prägte das Modell. Später war er Bundeskanzler (1963–1966). Deshalb lautet das Lösungswort dieses Escape-Rooms <strong>ERHARD</strong>.

        <li><strong>Säulen II</strong> – regulierende Prinzipien (Monopolaufsicht, Umverteilung, externe Effekte, soziale Sicherung)</li>

  `;
